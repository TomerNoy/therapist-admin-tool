name: Weekly Therapist Sync

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am
  workflow_dispatch:      # Allow manual runs

jobs:
  sync:
    runs-on: self-hosted
    env:
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      SHEET_GID: ${{ secrets.SHEET_GID }}
    steps:
      - uses: actions/checkout@v4

      - name: Write credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.SHEETS_SERVICE_ACCOUNT_JSON }}' > credentials/sheets-service-account.json
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > credentials/firebase-service-account.json

      - name: Install dependencies
        run: uv sync

      - name: Process spreadsheet
        run: uv run python src/main.py

      - name: Upload to Firebase
        run: uv run python src/upload_results_to_firebase.py
