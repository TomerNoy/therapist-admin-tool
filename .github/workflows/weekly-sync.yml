name: Weekly Therapist Sync

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am
  workflow_dispatch:      # Allow manual runs

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: uv sync

      - name: Run sync
        run: uv run python src/main.py
